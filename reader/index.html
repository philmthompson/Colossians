<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colossians — Immersive Reader</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Chapter data (edit these .js files to update text) -->
  <script src="data/chapter1.js"></script>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --warm-bg: #1a1410;
      --warm-bg-light: #2a2018;
      --warm-accent: #c8956c;
      --warm-gold: #d4a76a;
      --warm-cream: #f0e6d3;
      --warm-white: #faf5ed;
      --warm-muted: #8a7a6a;
      --warm-dim: #5a4a3a;
      --warm-glow: rgba(212, 167, 106, 0.15);
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    html {
      scroll-behavior: auto;
      background: var(--warm-bg);
    }

    body {
      font-family: var(--font-serif);
      background: var(--warm-bg);
      color: var(--warm-cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Version Selector ── */
    .version-selector {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      display: flex;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .version-selector.visible {
      opacity: 1;
    }

    .version-btn {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--warm-dim);
      border-radius: 2rem;
      background: rgba(26, 20, 16, 0.85);
      backdrop-filter: blur(10px);
      color: var(--warm-muted);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .version-btn:hover {
      border-color: var(--warm-accent);
      color: var(--warm-cream);
    }

    .version-btn.active {
      border-color: var(--warm-gold);
      color: var(--warm-gold);
      background: rgba(212, 167, 106, 0.1);
    }

    /* ── Progress Bar ── */
    .progress-track {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      z-index: 200;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--warm-accent), var(--warm-gold));
      transition: width 0.1s linear;
    }

    /* ── Chapter Nav ── */
    .chapter-nav {
      position: fixed;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .chapter-nav.visible {
      opacity: 1;
    }

    .chapter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid var(--warm-dim);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .chapter-dot.active {
      background: var(--warm-gold);
      border-color: var(--warm-gold);
      box-shadow: 0 0 12px rgba(212, 167, 106, 0.4);
    }

    .chapter-dot::after {
      content: attr(data-label);
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--warm-muted);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .chapter-dot:hover::after {
      opacity: 1;
    }

    /* ── Hero / Title Section ── */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(212, 167, 106, 0.08) 0%, transparent 70%);
    }

    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-cream);
      text-align: center;
      line-height: 1.1;
    }

    .hero-subtitle {
      font-family: var(--font-sans);
      font-size: clamp(0.7rem, 1.2vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-muted);
      margin-top: 1.5rem;
    }

    .hero-line {
      width: 60px;
      height: 1px;
      background: var(--warm-gold);
      margin-top: 2rem;
    }

    .hero-scroll-cue {
      position: absolute;
      bottom: 3rem;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-dim);
    }

    .hero-scroll-cue::after {
      content: '';
      display: block;
      width: 1px;
      height: 30px;
      background: linear-gradient(to bottom, var(--warm-dim), transparent);
      margin: 0.75rem auto 0;
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.3); }
    }

    /* ── Chapter Header ── */
    .chapter-header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .chapter-number {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 300;
      color: var(--warm-dim);
      line-height: 1;
    }

    .chapter-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-muted);
      margin-top: 1rem;
    }

    /* ── Phrase Sections ── */
    .phrase-section {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 2rem;
      position: relative;
    }

    .phrase-container {
      max-width: 800px;
      width: 100%;
      position: relative;
    }

    .phrase-ref {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-accent);
      margin-bottom: 1.5rem;
    }

    .phrase-text {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3.5vw, 2.8rem);
      font-weight: 300;
      line-height: 1.5;
      color: var(--warm-cream);
    }

    .phrase-text .word {
      display: inline;
    }

    .phrase-text em {
      font-style: italic;
      color: var(--warm-gold);
    }

    .phrase-annotation {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 300;
      line-height: 1.8;
      color: var(--warm-muted);
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(138, 122, 106, 0.2);
      max-width: 550px;
    }

    /* ── Parallax Divider ── */
    .divider {
      height: 25vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .divider-glow {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--warm-glow) 0%, transparent 70%);
    }

    /* ── Section Themes ── */
    .theme-greeting { --section-accent: #c8956c; }
    .theme-supremacy { --section-accent: #d4a76a; }
    .theme-reconciliation { --section-accent: #c09070; }
    .theme-mystery { --section-accent: #b8a080; }

    .phrase-section[data-theme]::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(212, 167, 106, 0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .chapter-nav { display: none; }
      .version-selector {
        top: auto;
        bottom: 1rem;
        right: 50%;
        transform: translateX(50%);
      }
      .phrase-section { padding: 1.5rem 1.5rem; min-height: 60vh; }
    }

    /* ── Inline Scene Images ── */
    .scene-img-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      position: relative;
      z-index: 2;
      pointer-events: none;
    }

    .scene-img-wrapper img {
      max-width: min(85vw, 680px);
      height: auto;
      border-radius: 6px;
      will-change: transform;
    }

    .scene-img-wrapper.align-left {
      justify-content: flex-start;
      padding-left: 0;
      padding-right: 0;
    }
    .scene-img-wrapper.align-left img {
      border-radius: 0 6px 6px 0;
    }

    .scene-img-wrapper.align-right {
      justify-content: flex-end;
      padding-left: 0;
      padding-right: 0;
    }
    .scene-img-wrapper.align-right img {
      border-radius: 6px 0 0 6px;
    }

    /* ── Verse Background Layer ── */
    .verse-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
    }

    .verse-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      will-change: transform;
    }

    /* ── Smooth Scroll Snap (optional enhancement) ── */
    @media (prefers-reduced-motion: no-preference) {
      .phrase-text .word {
        transition: opacity 0.4s ease;
      }
    }
  </style>
</head>
<body>

  <!-- Progress Bar -->
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Version Selector -->
  <div class="version-selector" id="versionSelector">
    <button class="version-btn active" data-version="ppv">PPV</button>
    <button class="version-btn" data-version="esv" disabled title="Coming soon">ESV</button>
    <button class="version-btn" data-version="greek" disabled title="Coming soon">Greek</button>
  </div>

  <!-- Chapter Navigation -->
  <nav class="chapter-nav" id="chapterNav">
    <div class="chapter-dot active" data-chapter="1" data-label="Chapter 1"></div>
    <div class="chapter-dot" data-chapter="2" data-label="Chapter 2"></div>
    <div class="chapter-dot" data-chapter="3" data-label="Chapter 3"></div>
    <div class="chapter-dot" data-chapter="4" data-label="Chapter 4"></div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <h1 class="hero-title">Colossians</h1>
    <p class="hero-subtitle">Phil's Paraphrase Version</p>
    <div class="hero-line"></div>
    <div class="hero-scroll-cue">Scroll to begin</div>
  </section>

  <!-- Content rendered by JS from data -->
  <main id="reader"></main>

  <script>
    // ────────────────────────────────────────
    // DATA LOADING
    // Loads chapter JSON files and renders phrase-by-phrase
    // ────────────────────────────────────────
    // Chapter data is loaded via <script> tags in <head> and
    // registered on window.ColossiansPPV[chapterNumber].
    // To add chapters: create data/chapter2.js, add a <script> tag, etc.
    const reader = document.getElementById('reader');
    let currentVersion = 'ppv';

    // Thematic groupings for visual sections (verse ranges → theme)
    const sectionMap = {
      1: [
        { start: 1, end: 2, theme: 'greeting' },
        { start: 3, end: 8, theme: 'thanksgiving' },
        { start: 9, end: 14, theme: 'prayer' },
        { start: 15, end: 20, theme: 'supremacy' },
        { start: 21, end: 23, theme: 'reconciliation' },
        { start: 24, end: 29, theme: 'mystery' }
      ]
    };

    function getThemeForVerse(chapter, verse) {
      const sections = sectionMap[chapter];
      if (!sections) return 'default';
      const section = sections.find(s => verse >= s.start && verse <= s.end);
      return section ? section.theme : 'default';
    }

    function isNewSection(chapter, verse) {
      const sections = sectionMap[chapter];
      if (!sections) return false;
      return sections.some(s => s.start === verse);
    }

    // Helper: create an inline scene image element
    function createSceneImg(src) {
      const wrapper = document.createElement('div');
      wrapper.className = 'scene-img-wrapper';
      wrapper.innerHTML = `<img src="${src}" alt="" />`;
      return wrapper;
    }

    // ────────────────────────────────────────
    // RENDER
    // ────────────────────────────────────────
    function renderAll() {
      reader.innerHTML = '';
      const ppv = window.ColossiansPPV || {};
      const chapterNums = Object.keys(ppv).map(Number).sort((a, b) => a - b);

      if (chapterNums.length === 0) {
        reader.innerHTML = '<div style="color:var(--warm-accent);text-align:center;padding:4rem 2rem;font-family:var(--font-sans);">No chapter data found.</div>';
        return;
      }

      chapterNums.forEach(chNum => {
        const data = ppv[chNum];

        // Chapter header
        const chHeader = document.createElement('section');
        chHeader.className = 'chapter-header';
        chHeader.id = `chapter-${chNum}`;
        chHeader.innerHTML = `
          <div class="chapter-number">${chNum}</div>
          <div class="chapter-label">Chapter ${chNum === 1 ? 'One' : chNum === 2 ? 'Two' : chNum === 3 ? 'Three' : 'Four'}</div>
        `;
        reader.appendChild(chHeader);

        // Insert writing image inline between chapter header and first verse
        if (chNum === 1) {
          const writingImg = createSceneImg('images/1_0-writing.png');
          writingImg.classList.add('align-left');
          reader.appendChild(writingImg);

          // Cell background — fixed layer behind verse 1:1
          const cellBg = document.createElement('div');
          cellBg.className = 'verse-bg';
          cellBg.id = 'cell-bg-1-1';
          cellBg.innerHTML = `<img src="images/1_1-cell.png" alt="" />`;
          document.body.appendChild(cellBg);
        }

        // Render each verse phrase-by-phrase
        data.verses.forEach(verse => {
          const theme = getThemeForVerse(verse.chapter, verse.verse);

          // Insert Timothy image before verse 1:2
          if (verse.chapter === 1 && verse.verse === 2) {
            reader.appendChild(createSceneImg('images/1_1-Timothy.png'));
          }

          // Insert a divider glow between thematic sections
          if (isNewSection(verse.chapter, verse.verse) && verse.verse > 1) {
            const div = document.createElement('div');
            div.className = 'divider';
            div.innerHTML = '<div class="divider-glow"></div>';
            reader.appendChild(div);
          }

          // Each phrase gets its own scroll-animated section
          verse.phrases.forEach((phrase, i) => {
            const el = document.createElement('section');
            el.className = 'phrase-section';
            el.dataset.theme = theme;
            el.dataset.verse = verse.id;

            // Wrap each word in a span for staggered reveal
            const words = phrase.split(/(\s+)/).map(w => {
              if (/^\s+$/.test(w)) return w;
              return `<span class="word">${w}</span>`;
            }).join('');

            // Show verse ref only on first phrase of each verse
            const refHtml = i === 0
              ? `<div class="phrase-ref">${verse.id}</div>`
              : '';

            el.innerHTML = `
              <div class="phrase-container">
                ${refHtml}
                <div class="phrase-text">${words}</div>
              </div>
            `;
            reader.appendChild(el);

            // Insert Paul image after the "From:" phrase
            if (verse.chapter === 1 && verse.verse === 1 && i === 0) {
              const paulImg = createSceneImg('images/1_1-Paul.png');
              paulImg.classList.add('align-right');
              reader.appendChild(paulImg);
            }

            // Insert map image after the "To:" phrase
            if (verse.chapter === 1 && verse.verse === 2 && i === 0) {
              reader.appendChild(createSceneImg('images/1_2-map.png'));
            }
          });

          // Insert Colossian image after all of 1:2, before 1:3
          if (verse.chapter === 1 && verse.verse === 2) {
            reader.appendChild(createSceneImg('images/1_2-Colossian.png'));
          }
        });
      });

      // Spacer at end
      const spacer = document.createElement('div');
      spacer.style.height = '50vh';
      reader.appendChild(spacer);

      initAnimations();
      // Ensure ScrollTrigger recalculates after async DOM insertion
      ScrollTrigger.refresh();
    }

    // ────────────────────────────────────────
    // ANIMATIONS
    // ────────────────────────────────────────
    function initAnimations() {
      ScrollTrigger.getAll().forEach(t => t.kill());

      // Hero entrance — set to hidden first, then animate in
      gsap.set(['.hero-title', '.hero-subtitle', '.hero-line', '.hero-scroll-cue'], { opacity: 0 });
      gsap.set('.hero-line', { scaleX: 0 });
      const heroTl = gsap.timeline({ delay: 0.3 });
      heroTl
        .to('.hero-title', { opacity: 1, duration: 1.2, ease: 'power2.out' })
        .to('.hero-subtitle', { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' }, '-=0.5')
        .to('.hero-line', { opacity: 1, scaleX: 1, duration: 0.6, ease: 'power2.out' }, '-=0.3')
        .to('.hero-scroll-cue', { opacity: 1, duration: 0.6 }, '-=0.2');

      // Hero parallax fade
      gsap.to('.hero', {
        scrollTrigger: {
          trigger: '.hero',
          start: 'top top',
          end: 'bottom top',
          scrub: true,
        },
        opacity: 0,
        y: -100,
        ease: 'none',
      });

      // Show nav elements after scrolling past hero
      ScrollTrigger.create({
        trigger: '.hero',
        start: 'bottom 80%',
        onEnter: () => {
          document.getElementById('versionSelector').classList.add('visible');
          document.getElementById('chapterNav').classList.add('visible');
        },
        onLeaveBack: () => {
          document.getElementById('versionSelector').classList.remove('visible');
          document.getElementById('chapterNav').classList.remove('visible');
        }
      });

      // Chapter headers
      document.querySelectorAll('.chapter-header').forEach(header => {
        gsap.set(header.querySelector('.chapter-number'), { opacity: 0, scale: 0.8 });
        gsap.set(header.querySelector('.chapter-label'), { opacity: 0, y: 20 });
        const tl = gsap.timeline({
          scrollTrigger: {
            trigger: header,
            start: 'top 70%',
            end: 'top 20%',
            scrub: true,
          }
        });
        tl.to(header.querySelector('.chapter-number'),
          { opacity: 1, scale: 1, ease: 'power2.out' }
        );
        tl.to(header.querySelector('.chapter-label'),
          { opacity: 1, y: 0, ease: 'power2.out' },
          '-=0.3'
        );
      });

      // Scene images — parallax drift with subtle zoom arc
      document.querySelectorAll('.scene-img-wrapper').forEach(wrapper => {
        const img = wrapper.querySelector('img');

        // Vertical parallax
        gsap.fromTo(img,
          { y: 80 },
          {
            y: -80,
            ease: 'none',
            scrollTrigger: {
              trigger: wrapper,
              start: 'top bottom',
              end: 'bottom top',
              scrub: true,
            }
          }
        );

        // Subtle zoom: scale up as image enters, then back down as it leaves
        gsap.fromTo(img,
          { scale: 0.97 },
          {
            scale: 1.03,
            ease: 'power1.inOut',
            scrollTrigger: {
              trigger: wrapper,
              start: 'top 85%',
              end: 'bottom 15%',
              scrub: true,
            }
          }
        );
      });

      // Cell background — zoom out from deep inside the cell through prison bars
      // Continues zooming all the way through 1:2, fades out when 1:2 hits center
      const cellBg = document.getElementById('cell-bg-1-1');
      if (cellBg) {
        const cellImg = cellBg.querySelector('img');
        const v1sections = document.querySelectorAll('.phrase-section[data-verse="1:1"]');
        const v2sections = document.querySelectorAll('.phrase-section[data-verse="1:2"]');
        const endSections = v2sections.length ? v2sections : v1sections;
        if (v1sections.length) {
          const firstEl = v1sections[0];
          const lastV2 = endSections[endSections.length - 1];

          // Start zoomed deep into the cell
          gsap.set(cellImg, { scale: 2.5 });

          gsap.timeline({
            scrollTrigger: {
              trigger: firstEl,
              endTrigger: lastV2,
              start: 'top 90%',
              end: 'center center',
              scrub: 1.5,
            }
          })
          // Fade in
          .to(cellBg, { opacity: 0.18, duration: 0.1, ease: 'power1.out' })
          // Zoom out continuously across the entire span (1:1 through 1:2)
          .to(cellImg, { scale: 0.9, duration: 0.85, ease: 'power1.inOut' }, 0)
          // Fade out only at the very end, when 1:2 is centered
          .to(cellBg, { opacity: 0, duration: 0.15, ease: 'power1.in' }, 0.85);
        }
      }

      // Phrase sections — scroll-scrubbed word-by-word reveal
      document.querySelectorAll('.phrase-section').forEach(section => {
        const ref = section.querySelector('.phrase-ref');
        const words = section.querySelectorAll('.word');

        // Hide elements via JS so they're visible if GSAP fails
        if (ref) gsap.set(ref, { opacity: 0, x: -20 });
        gsap.set(words, { opacity: 0 });

        const tl = gsap.timeline({
          scrollTrigger: {
            trigger: section,
            start: 'top 65%',
            end: 'top 15%',
            scrub: true,
          }
        });

        // Reference fades in first
        if (ref) {
          tl.to(ref,
            { opacity: 1, x: 0, duration: 0.3, ease: 'power2.out' }
          );
        }

        // Words reveal with stagger
        tl.to(words,
          { opacity: 1, duration: 0.1, stagger: 0.02, ease: 'power1.out' },
          ref ? '-=0.1' : '0'
        );

        // Parallax: slight upward drift
        gsap.fromTo(section.querySelector('.phrase-container'),
          { y: 40 },
          {
            y: -40,
            ease: 'none',
            scrollTrigger: {
              trigger: section,
              start: 'top bottom',
              end: 'bottom top',
              scrub: true,
            }
          }
        );
      });

      // Divider glow pulse
      document.querySelectorAll('.divider-glow').forEach(glow => {
        gsap.fromTo(glow,
          { opacity: 0, scale: 0.5 },
          {
            opacity: 0.6,
            scale: 1,
            ease: 'power2.out',
            scrollTrigger: {
              trigger: glow,
              start: 'top 80%',
              end: 'top 30%',
              scrub: true,
            }
          }
        );
      });

      // Progress bar
      ScrollTrigger.create({
        trigger: document.body,
        start: 'top top',
        end: 'bottom bottom',
        onUpdate: (self) => {
          document.getElementById('progressFill').style.width = `${self.progress * 100}%`;
        }
      });

      // Chapter dot tracking
      document.querySelectorAll('.chapter-header').forEach(header => {
        const chNum = header.id.replace('chapter-', '');
        ScrollTrigger.create({
          trigger: header,
          start: 'top center',
          end: 'bottom center',
          onEnter: () => setActiveDot(chNum),
          onEnterBack: () => setActiveDot(chNum),
        });
      });
    }

    function setActiveDot(chNum) {
      document.querySelectorAll('.chapter-dot').forEach(dot => {
        dot.classList.toggle('active', dot.dataset.chapter === String(chNum));
      });
    }

    // ────────────────────────────────────────
    // VERSION SWITCHING
    // ────────────────────────────────────────
    document.querySelectorAll('.version-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentVersion = btn.dataset.version;
        // Future: reload with different version data
        renderAll();
        window.scrollTo(0, 0);
      });
    });

    // Chapter dot click navigation
    document.querySelectorAll('.chapter-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        const target = document.getElementById(`chapter-${dot.dataset.chapter}`);
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    });

    // ────────────────────────────────────────
    // INIT
    // ────────────────────────────────────────
    renderAll();
  </script>
</body>
</html>
