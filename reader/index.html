<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colossians — Immersive Reader</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Chapter data (edit these .js files to update text) -->
  <script src="data/chapter1.js"></script>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --warm-bg: #1a1410;
      --warm-bg-light: #2a2018;
      --warm-accent: #c8956c;
      --warm-gold: #d4a76a;
      --warm-cream: #f0e6d3;
      --warm-white: #faf5ed;
      --warm-muted: #8a7a6a;
      --warm-dim: #5a4a3a;
      --warm-glow: rgba(212, 167, 106, 0.15);
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    html {
      scroll-behavior: auto;
      background: var(--warm-bg);
    }

    body {
      font-family: var(--font-serif);
      background: var(--warm-bg);
      color: var(--warm-cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Version Selector ── */
    .version-selector {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      display: flex;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .version-selector.visible {
      opacity: 1;
    }

    .version-btn {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--warm-dim);
      border-radius: 2rem;
      background: rgba(26, 20, 16, 0.85);
      backdrop-filter: blur(10px);
      color: var(--warm-muted);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .version-btn:hover {
      border-color: var(--warm-accent);
      color: var(--warm-cream);
    }

    .version-btn.active {
      border-color: var(--warm-gold);
      color: var(--warm-gold);
      background: rgba(212, 167, 106, 0.1);
    }

    /* ── Progress Bar ── */
    .progress-track {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      z-index: 200;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--warm-accent), var(--warm-gold));
      transition: width 0.1s linear;
    }

    /* ── Chapter Nav ── */
    .chapter-nav {
      position: fixed;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .chapter-nav.visible {
      opacity: 1;
    }

    .chapter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid var(--warm-dim);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .chapter-dot.active {
      background: var(--warm-gold);
      border-color: var(--warm-gold);
      box-shadow: 0 0 12px rgba(212, 167, 106, 0.4);
    }

    .chapter-dot::after {
      content: attr(data-label);
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--warm-muted);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .chapter-dot:hover::after {
      opacity: 1;
    }

    /* ── Hero / Title Section ── */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(212, 167, 106, 0.08) 0%, transparent 70%);
    }

    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-cream);
      text-align: center;
      line-height: 1.1;
    }

    .hero-subtitle {
      font-family: var(--font-sans);
      font-size: clamp(0.7rem, 1.2vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-muted);
      margin-top: 1.5rem;
    }

    .hero-line {
      width: 60px;
      height: 1px;
      background: var(--warm-gold);
      margin-top: 2rem;
    }

    .hero-scroll-cue {
      position: absolute;
      bottom: 3rem;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-dim);
    }

    .hero-scroll-cue::after {
      content: '';
      display: block;
      width: 1px;
      height: 30px;
      background: linear-gradient(to bottom, var(--warm-dim), transparent);
      margin: 0.75rem auto 0;
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.3); }
    }

    /* ── Chapter Header ── */
    .chapter-header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .chapter-number {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 300;
      color: var(--warm-dim);
      line-height: 1;
    }

    .chapter-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warm-muted);
      margin-top: 1rem;
    }

    /* ── Phrase Sections ── */
    .phrase-section {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 2rem;
      position: relative;
    }

    .phrase-container {
      max-width: 800px;
      width: 100%;
      position: relative;
    }

    .phrase-ref {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-accent);
      margin-bottom: 1.5rem;
    }

    .phrase-text {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3.5vw, 2.8rem);
      font-weight: 300;
      line-height: 1.5;
      color: var(--warm-cream);
    }

    .phrase-text .word {
      display: inline;
    }

    .phrase-text em {
      font-style: italic;
      color: var(--warm-gold);
    }

    .phrase-annotation {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 300;
      line-height: 1.8;
      color: var(--warm-muted);
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(138, 122, 106, 0.2);
      max-width: 550px;
    }

    /* ── Parallax Divider ── */
    .divider {
      height: 25vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .divider-glow {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--warm-glow) 0%, transparent 70%);
    }

    /* ── Section Themes ── */
    .theme-greeting { --section-accent: #c8956c; }
    .theme-supremacy { --section-accent: #d4a76a; }
    .theme-reconciliation { --section-accent: #c09070; }
    .theme-mystery { --section-accent: #b8a080; }

    .phrase-section[data-theme]::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(212, 167, 106, 0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .chapter-nav { display: none; }
      .version-selector {
        top: auto;
        bottom: 1rem;
        right: 50%;
        transform: translateX(50%);
      }
      .phrase-section { padding: 1.5rem 1.5rem; min-height: 60vh; }
      .colossae-layer.layer-clouds img {
        min-width: 110% !important;
      }
    }

    /* ── Inline Scene Images ── */
    .scene-img-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      position: relative;
      z-index: 2;
      pointer-events: none;
    }

    .scene-img-wrapper img {
      max-width: min(85vw, 680px);
      height: auto;
      border-radius: 6px;
      will-change: transform;
    }

    .scene-img-wrapper.align-left {
      justify-content: flex-start;
      padding-left: 0;
      padding-right: 0;
    }
    .scene-img-wrapper.align-left img {
      border-radius: 0 6px 6px 0;
    }

    .scene-img-wrapper.align-right {
      justify-content: flex-end;
      padding-left: 0;
      padding-right: 0;
    }
    .scene-img-wrapper.align-right img {
      border-radius: 6px 0 0 6px;
    }

    /* ── Verse Background Layer ── */
    .verse-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
    }

    .verse-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      will-change: transform;
    }

    /* ── Colossae Parallax Background ── */
    .colossae-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
    }

    .colossae-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      will-change: transform;
    }

    .colossae-layer img {
      position: absolute;
      will-change: transform;
    }

    .colossae-layer.layer-city img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .colossae-layer.layer-clouds img {
      position: absolute;
    }

    /* ── Faith / Love / Hope Gold Wireframe Overlays ── */
    .wireframe-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      overflow: visible;
    }

    .wireframe-overlay img {
      width: clamp(100px, 22vw, 260px);
      height: auto;
      opacity: 0;
      filter: drop-shadow(0 0 12px rgba(232, 183, 48, 0.5));
    }

    /* SVG block — sits between phrases in its own scroll space */
    .svg-block {
      width: 100%;
      min-height: 25vh;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      overflow: visible;
    }
    .svg-block > img {
      width: clamp(100px, 22vw, 260px);
      height: auto;
      opacity: 0;
      filter: drop-shadow(0 0 12px rgba(232, 183, 48, 0.5));
    }

    /* Gold-glow keywords */
    .gold-word {
      transition: color 0.4s, text-shadow 0.4s;
    }
    .gold-word.glow-active {
      color: #f6d365 !important;
      text-shadow:
        0 0 8px rgba(246, 211, 101, 0.7),
        0 0 20px rgba(232, 183, 48, 0.4),
        0 0 40px rgba(232, 183, 48, 0.2);
    }

    /* Gold filter — turns black SVGs into gold wireframe look */
    .gold-filter {
      filter: invert(75%) sepia(50%) saturate(500%) hue-rotate(5deg) brightness(1.05)
        drop-shadow(0 0 15px rgba(232, 183, 48, 0.6)) !important;
    }

    /* Walk overlay — fixed walking figure */
    .walk-fixed {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100vh;
      pointer-events: none;
      z-index: 1;
      display: flex;
      align-items: center;
      opacity: 0;
    }
    .walk-fixed img {
      width: clamp(80px, 15vw, 180px);
      height: auto;
    }

    /* Fruit scatter background */
    .fruit-fixed {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100vh;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      overflow: hidden;
    }
    .fruit-fixed img {
      position: absolute;
      width: clamp(30px, 6vw, 70px);
      height: auto;
    }

    /* Empowered flex animation */
    @keyframes flex-pulse {
      0%, 100% { transform: scaleX(1) scaleY(1); }
      25% { transform: scaleX(1.03) scaleY(0.97); }
      75% { transform: scaleX(0.97) scaleY(1.03); }
    }
    .svg-empowered.flexing {
      animation: flex-pulse 1.5s ease-in-out infinite;
      transform-origin: center bottom;
    }

    /* Kingdoms — two halves */
    .kingdoms-container {
      position: relative;
      width: clamp(100px, 22vw, 260px);
      height: clamp(80px, 18vw, 210px);
    }
    .kingdoms-container img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      opacity: 0;
    }
    .kingdoms-dark {
      clip-path: inset(0 50% 0 0);
      filter: invert(20%) sepia(90%) saturate(700%) hue-rotate(340deg) brightness(1.2)
        drop-shadow(0 0 20px rgba(255, 60, 60, 0.8)) !important;
    }
    .kingdoms-light {
      clip-path: inset(0 0 0 50%);
      filter: invert(85%) sepia(40%) saturate(600%) hue-rotate(5deg) brightness(1.3)
        drop-shadow(0 0 25px rgba(246, 211, 101, 0.9)) !important;
    }

    /* Forgiveness — eraser wipe */
    .forgiveness-container {
      position: relative;
      width: clamp(100px, 22vw, 260px);
      height: clamp(80px, 18vw, 210px);
    }
    .forgiveness-container img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      opacity: 0;
    }

    /* Glory swap — bright background for blinding glory lines */
    .glory-swap {
      background-color: var(--warm-bg);
      transition: background-color 0.6s ease;
    }
    .glory-swap.bright {
      background-color: var(--warm-cream) !important;
    }
    .glory-swap .phrase-text {
      transition: color 0.6s ease;
    }
    .glory-swap.bright .phrase-text {
      color: var(--warm-bg) !important;
    }
    .glory-swap .phrase-ref {
      transition: color 0.6s ease;
    }
    .glory-swap.bright .phrase-ref {
      color: #8b5e3c !important;
    }

    /* Dotted underline words */
    .dotted-word {
      position: relative;
      display: inline-block;
    }
    .dotted-word::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      border-bottom: 2px dotted var(--warm-gold);
    }
    .dotted-word.underline-active::after {
      width: 100%;
      transition: width 0.8s ease;
    }

    /* Joy emphasis */
    .joy-word {
      display: inline-block;
      transition: color 0.5s, transform 0.5s, text-shadow 0.5s;
    }
    .joy-word.joy-active {
      color: #f6d365 !important;
      transform: scale(1.2);
      text-shadow:
        0 0 12px rgba(246, 211, 101, 0.8),
        0 0 30px rgba(232, 183, 48, 0.5);
    }

    /* ── Smooth Scroll Snap (optional enhancement) ── */
    @media (prefers-reduced-motion: no-preference) {
      .phrase-text .word {
        transition: opacity 0.4s ease;
      }
    }
  </style>
</head>
<body>

  <!-- Progress Bar -->
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Version Selector -->
  <div class="version-selector" id="versionSelector">
    <button class="version-btn active" data-version="ppv">PPV</button>
    <button class="version-btn" data-version="esv" disabled title="Coming soon">ESV</button>
    <button class="version-btn" data-version="greek" disabled title="Coming soon">Greek</button>
  </div>

  <!-- Chapter Navigation -->
  <nav class="chapter-nav" id="chapterNav">
    <div class="chapter-dot active" data-chapter="1" data-label="Chapter 1"></div>
    <div class="chapter-dot" data-chapter="2" data-label="Chapter 2"></div>
    <div class="chapter-dot" data-chapter="3" data-label="Chapter 3"></div>
    <div class="chapter-dot" data-chapter="4" data-label="Chapter 4"></div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <h1 class="hero-title">Colossians</h1>
    <p class="hero-subtitle">Phil's Paraphrase Version</p>
    <div class="hero-line"></div>
    <div class="hero-scroll-cue">Scroll to begin</div>
  </section>

  <!-- Content rendered by JS from data -->
  <main id="reader"></main>

  <script>
    // ────────────────────────────────────────
    // DATA LOADING
    // Loads chapter JSON files and renders phrase-by-phrase
    // ────────────────────────────────────────
    // Chapter data is loaded via <script> tags in <head> and
    // registered on window.ColossiansPPV[chapterNumber].
    // To add chapters: create data/chapter2.js, add a <script> tag, etc.
    const reader = document.getElementById('reader');
    let currentVersion = 'ppv';

    // Thematic groupings for visual sections (verse ranges → theme)
    const sectionMap = {
      1: [
        { start: 1, end: 2, theme: 'greeting' },
        { start: 3, end: 8, theme: 'thanksgiving' },
        { start: 9, end: 14, theme: 'prayer' },
        { start: 15, end: 20, theme: 'supremacy' },
        { start: 21, end: 23, theme: 'reconciliation' },
        { start: 24, end: 29, theme: 'mystery' }
      ]
    };

    function getThemeForVerse(chapter, verse) {
      const sections = sectionMap[chapter];
      if (!sections) return 'default';
      const section = sections.find(s => verse >= s.start && verse <= s.end);
      return section ? section.theme : 'default';
    }

    function isNewSection(chapter, verse) {
      const sections = sectionMap[chapter];
      if (!sections) return false;
      return sections.some(s => s.start === verse);
    }

    // Helper: create an inline scene image element
    function createSceneImg(src) {
      const wrapper = document.createElement('div');
      wrapper.className = 'scene-img-wrapper';
      wrapper.innerHTML = `<img src="${src}" alt="" />`;
      return wrapper;
    }

    function createSvgBlock(html) {
      const wrapper = document.createElement('div');
      wrapper.className = 'svg-block';
      wrapper.innerHTML = html;
      return wrapper;
    }

    // ────────────────────────────────────────
    // RENDER
    // ────────────────────────────────────────
    function renderAll() {
      reader.innerHTML = '';
      const ppv = window.ColossiansPPV || {};
      const chapterNums = Object.keys(ppv).map(Number).sort((a, b) => a - b);

      if (chapterNums.length === 0) {
        reader.innerHTML = '<div style="color:var(--warm-accent);text-align:center;padding:4rem 2rem;font-family:var(--font-sans);">No chapter data found.</div>';
        return;
      }

      chapterNums.forEach(chNum => {
        const data = ppv[chNum];

        // Chapter header
        const chHeader = document.createElement('section');
        chHeader.className = 'chapter-header';
        chHeader.id = `chapter-${chNum}`;
        chHeader.innerHTML = `
          <div class="chapter-number">${chNum}</div>
          <div class="chapter-label">Chapter ${chNum === 1 ? 'One' : chNum === 2 ? 'Two' : chNum === 3 ? 'Three' : 'Four'}</div>
        `;
        reader.appendChild(chHeader);

        // Insert writing image inline between chapter header and first verse
        if (chNum === 1) {
          const writingImg = createSceneImg('images/1_0-writing.png');
          writingImg.classList.add('align-left');
          reader.appendChild(writingImg);

          // Cell background — fixed layer behind verse 1:1
          const cellBg = document.createElement('div');
          cellBg.className = 'verse-bg';
          cellBg.id = 'cell-bg-1-1';
          cellBg.innerHTML = `<img src="images/1_1-cell.png" alt="" />`;
          document.body.appendChild(cellBg);
        }

        // Render each verse phrase-by-phrase
        data.verses.forEach(verse => {
          const theme = getThemeForVerse(verse.chapter, verse.verse);

          // Insert Timothy image before verse 1:2
          if (verse.chapter === 1 && verse.verse === 2) {
            reader.appendChild(createSceneImg('images/1_1-Timothy.png'));
          }

          // Insert a divider glow between thematic sections
          if (isNewSection(verse.chapter, verse.verse) && verse.verse > 1) {
            const div = document.createElement('div');
            div.className = 'divider';
            div.innerHTML = '<div class="divider-glow"></div>';
            reader.appendChild(div);
          }

          // Each phrase gets its own scroll-animated section
          verse.phrases.forEach((phrase, i) => {
            const el = document.createElement('section');
            el.className = 'phrase-section';
            el.dataset.theme = theme;
            el.dataset.verse = verse.id;

            // Wrap each word in a span for staggered reveal
            const goldWords = (verse.chapter === 1 && (verse.verse === 4 || verse.verse === 5))
              ? /^(faith|love|confidence),?$/i : null;
            const specialWordMap = (verse.chapter === 1 && verse.verse === 11 && i === 2)
              ? { patience: 'dotted-word', endurance: 'dotted-word', joy: 'joy-word' } : null;
            const words = phrase.split(/(\s+)/).map(w => {
              if (/^\s+$/.test(w)) return w;
              const bare = w.replace(/[,;:.!?]/g, '');
              if (goldWords && goldWords.test(bare)) {
                return `<span class="word gold-word">${w}</span>`;
              }
              if (specialWordMap) {
                const cls = specialWordMap[bare.toLowerCase()];
                if (cls) return `<span class="word ${cls}">${w}</span>`;
              }
              return `<span class="word">${w}</span>`;
            }).join('');

            // Show verse ref only on first phrase of each verse
            const refHtml = i === 0
              ? `<div class="phrase-ref">${verse.id}</div>`
              : '';

            el.innerHTML = `
              <div class="phrase-container">
                ${refHtml}
                <div class="phrase-text">${words}</div>
              </div>
            `;
            reader.appendChild(el);

            // Insert Paul image after the "From:" phrase
            if (verse.chapter === 1 && verse.verse === 1 && i === 0) {
              const paulImg = createSceneImg('images/1_1-Paul.png');
              paulImg.classList.add('align-right');
              reader.appendChild(paulImg);
            }

            // Insert gold wireframe SVGs between phrases
            if (verse.chapter === 1 && verse.verse === 4 && i === 0) {
              reader.appendChild(createSvgBlock('<img src="images/1_3-faith.svg" alt="" class="wireframe-icon wireframe-faith" />'));
            }
            if (verse.chapter === 1 && verse.verse === 4 && i === 1) {
              reader.appendChild(createSvgBlock('<img src="images/1_3-love.svg" alt="" class="wireframe-icon wireframe-love" />'));
            }
            if (verse.chapter === 1 && verse.verse === 5 && i === 0) {
              reader.appendChild(createSvgBlock('<img src="images/1_3-hope.svg" alt="" class="wireframe-icon wireframe-hope" />'));
            }

            // ── 1:6 SVG blocks ──
            if (verse.chapter === 1 && verse.verse === 6 && i === 0) {
              reader.appendChild(createSvgBlock('<img src="images/1_6-with-across-the-world.svg" alt="" class="wireframe-icon gold-filter" />'));
            }
            if (verse.chapter === 1 && verse.verse === 6 && i === 1) {
              reader.appendChild(createSvgBlock('<img src="images/1_6-before-you-produce-fruit.svg" alt="" class="wireframe-icon gold-filter" />'));
            }
            if (verse.chapter === 1 && verse.verse === 6 && i === 2) {
              reader.appendChild(createSvgBlock('<img src="images/1_6-after-little-children.svg" alt="" class="svg-icon gold-filter hand-drawn" />'));
            }
            if (verse.chapter === 1 && verse.verse === 6 && i === 3) {
              reader.appendChild(createSvgBlock('<img src="images/1_6-saving-grace.svg" alt="" class="wireframe-icon gold-filter" />'));
            }

            // ── 1:7 scene images (zoom in/out) ──
            if (verse.chapter === 1 && verse.verse === 7 && i === 0) {
              reader.appendChild(createSceneImg('images/1_7-Epaphras.png'));
            }
            if (verse.chapter === 1 && verse.verse === 7 && i === 1) {
              reader.appendChild(createSceneImg('images/1_7-coworker.png'));
            }

            // ── 1:9 praying image + knowledge block ──
            if (verse.chapter === 1 && verse.verse === 9 && i === 1) {
              reader.appendChild(createSceneImg('images/1_9-praying.png'));
            }
            if (verse.chapter === 1 && verse.verse === 9 && i === 2) {
              reader.appendChild(createSvgBlock('<img src="images/1_9-knowledge.svg" alt="" class="wireframe-icon gold-filter" />'));
            }

            // ── 1:10 walk (fixed), fruit (scattered fixed), children (hand-drawn) ──
            if (verse.chapter === 1 && verse.verse === 10 && i === 0) {
              const walkEl = document.createElement('div');
              walkEl.className = 'walk-fixed';
              walkEl.id = 'walk-fixed';
              walkEl.innerHTML = '<img src="images/1_10-walk.svg" alt="" class="gold-filter" />';
              document.body.appendChild(walkEl);
            }
            if (verse.chapter === 1 && verse.verse === 10 && i === 2) {
              const fruitEl = document.createElement('div');
              fruitEl.className = 'fruit-fixed';
              fruitEl.id = 'fruit-fixed';
              const imgs = [];
              for (let f = 0; f < 15; f++) {
                imgs.push(`<img src="images/1_10-fruit.svg" alt="" class="gold-filter" style="left:${Math.random()*90}%;top:${Math.random()*85}%;transform:rotate(${Math.random()*360}deg) scale(${0.4+Math.random()*0.8});" />`);
              }
              fruitEl.innerHTML = imgs.join('');
              document.body.appendChild(fruitEl);
            }
            if (verse.chapter === 1 && verse.verse === 10 && i === 3) {
              reader.appendChild(createSvgBlock('<img src="images/1_10-children.svg" alt="" class="svg-icon gold-filter hand-drawn" />'));
            }

            // ── 1:11 empowered block + glory swap ──
            if (verse.chapter === 1 && verse.verse === 11 && i === 0) {
              reader.appendChild(createSvgBlock('<img src="images/1_11-empowered.svg" alt="" class="svg-icon gold-filter svg-empowered" />'));
            }
            if (verse.chapter === 1 && verse.verse === 11 && i === 1) {
              el.classList.add('glory-swap');
            }

            // ── 1:12 bright inheritance glory swap ──
            if (verse.chapter === 1 && verse.verse === 12 && i === 1) {
              el.classList.add('glory-swap');
            }

            // ── 1:13 kingdoms block (left red, right bright) ──
            if (verse.chapter === 1 && verse.verse === 13 && i === 0) {
              reader.appendChild(createSvgBlock('<div class="kingdoms-container"><img src="images/1_13-kingdoms.svg" alt="" class="kingdoms-dark" /><img src="images/1_13-kingdoms.svg" alt="" class="kingdoms-light" /></div>'));
            }

            // ── 1:14 chains + forgiveness blocks ──
            if (verse.chapter === 1 && verse.verse === 14 && i === 0) {
              reader.appendChild(createSvgBlock('<img src="images/1_14-chains.svg" alt="" class="wireframe-icon gold-filter" />'));
            }
            if (verse.chapter === 1 && verse.verse === 14 && i === 1) {
              reader.appendChild(createSvgBlock('<div class="forgiveness-container"><img src="images/1_14-forgiveness.svg" alt="" class="forgiveness-mark gold-filter" /><img src="images/1_14-forgiveness.svg" alt="" class="forgiveness-eraser gold-filter" /></div>'));
            }

            // Create Colossae parallax background when 1:2 begins
            if (verse.chapter === 1 && verse.verse === 2 && i === 0) {
              const colBg = document.createElement('div');
              colBg.className = 'colossae-bg';
              colBg.id = 'colossae-bg';
              colBg.innerHTML = `
                <div class="colossae-layer layer-city"><img src="images/1_2-city.png" alt="" /></div>
                <div class="colossae-layer layer-clouds">
                  <img src="images/1_2-cloud1.png" alt="" style="top:-5%;left:-10%;width:55%;" />
                  <img src="images/1_2-cloud2.png" alt="" style="top:-8%;right:-10%;left:auto;width:55%;" />
                  <img src="images/1_2-cloud3.png" alt="" style="top:25%;left:10%;width:50%;" />
                  <img src="images/1_2-cloud4.png" alt="" style="top:15%;right:-5%;left:auto;width:50%;" />
                  <img src="images/1_2-cloud5.png" alt="" style="top:45%;left:-5%;width:55%;" />
                  <img src="images/1_2-cloud5.png" alt="" style="top:50%;right:-5%;left:auto;width:55%;" />
                  <img src="images/1_2-cloud5.png" alt="" style="top:70%;left:5%;width:50%;" />
                  <img src="images/1_2-cloud5.png" alt="" style="top:65%;right:0%;left:auto;width:50%;" />
                </div>
              `;
              document.body.appendChild(colBg);
            }
          });

          // (1_2-Colossian removed — replaced by Colossae parallax background)
        });
      });

      // Spacer at end
      const spacer = document.createElement('div');
      spacer.style.height = '50vh';
      reader.appendChild(spacer);

      initAnimations();
      // Ensure ScrollTrigger recalculates after async DOM insertion
      ScrollTrigger.refresh();
    }

    // ────────────────────────────────────────
    // ANIMATIONS
    // ────────────────────────────────────────
    function initAnimations() {
      ScrollTrigger.getAll().forEach(t => t.kill());

      // Hero entrance — set to hidden first, then animate in
      gsap.set(['.hero-title', '.hero-subtitle', '.hero-line', '.hero-scroll-cue'], { opacity: 0 });
      gsap.set('.hero-line', { scaleX: 0 });
      const heroTl = gsap.timeline({ delay: 0.3 });
      heroTl
        .to('.hero-title', { opacity: 1, duration: 1.2, ease: 'power2.out' })
        .to('.hero-subtitle', { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' }, '-=0.5')
        .to('.hero-line', { opacity: 1, scaleX: 1, duration: 0.6, ease: 'power2.out' }, '-=0.3')
        .to('.hero-scroll-cue', { opacity: 1, duration: 0.6 }, '-=0.2');

      // Hero parallax fade
      gsap.to('.hero', {
        scrollTrigger: {
          trigger: '.hero',
          start: 'top top',
          end: 'bottom top',
          scrub: true,
        },
        opacity: 0,
        y: -100,
        ease: 'none',
      });

      // Show nav elements after scrolling past hero
      ScrollTrigger.create({
        trigger: '.hero',
        start: 'bottom 80%',
        onEnter: () => {
          document.getElementById('versionSelector').classList.add('visible');
          document.getElementById('chapterNav').classList.add('visible');
        },
        onLeaveBack: () => {
          document.getElementById('versionSelector').classList.remove('visible');
          document.getElementById('chapterNav').classList.remove('visible');
        }
      });

      // Chapter headers
      document.querySelectorAll('.chapter-header').forEach(header => {
        gsap.set(header.querySelector('.chapter-number'), { opacity: 0, scale: 0.8 });
        gsap.set(header.querySelector('.chapter-label'), { opacity: 0, y: 20 });
        const tl = gsap.timeline({
          scrollTrigger: {
            trigger: header,
            start: 'top 70%',
            end: 'top 20%',
            scrub: true,
          }
        });
        tl.to(header.querySelector('.chapter-number'),
          { opacity: 1, scale: 1, ease: 'power2.out' }
        );
        tl.to(header.querySelector('.chapter-label'),
          { opacity: 1, y: 0, ease: 'power2.out' },
          '-=0.3'
        );
      });

      // Scene images — parallax drift with subtle zoom arc
      document.querySelectorAll('.scene-img-wrapper').forEach(wrapper => {
        const img = wrapper.querySelector('img');

        // Vertical parallax
        gsap.fromTo(img,
          { y: 80 },
          {
            y: -80,
            ease: 'none',
            scrollTrigger: {
              trigger: wrapper,
              start: 'top bottom',
              end: 'bottom top',
              scrub: true,
            }
          }
        );

        // Subtle zoom: scale up as image enters, then back down as it leaves
        gsap.fromTo(img,
          { scale: 0.97 },
          {
            scale: 1.03,
            ease: 'power1.inOut',
            scrollTrigger: {
              trigger: wrapper,
              start: 'top 85%',
              end: 'bottom 15%',
              scrub: true,
            }
          }
        );
      });

      // Cell background — zoom out from deep inside the cell through prison bars
      // Fades out by the time 1:2 "To:" is centered in the viewport
      const cellBg = document.getElementById('cell-bg-1-1');
      if (cellBg) {
        const cellImg = cellBg.querySelector('img');
        const v1sections = document.querySelectorAll('.phrase-section[data-verse="1:1"]');
        const firstV2 = document.querySelector('.phrase-section[data-verse="1:2"]');
        const endTrigger = firstV2 || v1sections[v1sections.length - 1];
        if (v1sections.length) {
          const firstEl = v1sections[0];

          // Start zoomed deep into the cell
          gsap.set(cellImg, { scale: 2.5 });

          gsap.timeline({
            scrollTrigger: {
              trigger: firstEl,
              endTrigger: endTrigger,
              start: 'top 90%',
              end: 'center center',
              scrub: 1.5,
            }
          })
          // Fade in
          .to(cellBg, { opacity: 0.18, duration: 0.1, ease: 'power1.out' })
          // Zoom out across 1:1
          .to(cellImg, { scale: 1.0, duration: 0.7, ease: 'power1.inOut' }, 0)
          // Fade out before 1:2 "To:" reaches center
          .to(cellBg, { opacity: 0, duration: 0.25, ease: 'power1.in' }, 0.75);
        }
      }

      // Colossae parallax — clouds cover city, zoom out and part to reveal
      const colBg = document.getElementById('colossae-bg');
      if (colBg) {
        const v2sections = document.querySelectorAll('.phrase-section[data-verse="1:2"]');
        const v3section = document.querySelector('.phrase-section[data-verse="1:3"]');
        if (v2sections.length && v3section) {
          const firstV2 = v2sections[0];

          const cityLayer = colBg.querySelector('.layer-city');
          const cloudImgs = colBg.querySelectorAll('.layer-clouds img');

          // Start: city zoomed in tight so only the mountain peak is visible
          gsap.set(cityLayer, { scale: 3, transformOrigin: '50% 15%' });
          // Clouds start large to fully cover the scene
          gsap.set(cloudImgs, { scale: 1.6 });

          const colTl = gsap.timeline({
            scrollTrigger: {
              trigger: firstV2,
              endTrigger: v3section,
              start: 'top 80%',
              end: 'top center',
              scrub: 1.5,
            }
          });

          // Fade in
          colTl.to(colBg, { opacity: 0.2, duration: 0.08, ease: 'power1.out' }, 0);

          // City zooms out fully to reveal the whole scene (first 60% of timeline)
          colTl.to(cityLayer, { scale: 1, duration: 0.6, ease: 'power1.inOut' }, 0);

          // Clouds part to the sides and fade gradually (first 70% of timeline)
          cloudImgs.forEach((cloud, i) => {
            const isLeft = (i % 2 === 0);
            const driftX = (isLeft ? -1 : 1) * (120 + i * 25);
            colTl.to(cloud, {
              x: driftX,
              scale: 1.0,
              opacity: 0,
              duration: 0.65,
              ease: 'power2.out',
            }, 0.1);
          });

          // Fade out right at verse 1:3
          colTl.to(colBg, { opacity: 0, duration: 0.12, ease: 'power1.in' }, 0.88);
        }
      }

      // Faith / Love / Hope wireframe animations
      document.querySelectorAll('.wireframe-icon').forEach(icon => {
        const section = icon.closest('.svg-block');
        if (!section) return;

        // Determine animation style per icon
        const isFaith = icon.classList.contains('wireframe-faith');
        const isLove = icon.classList.contains('wireframe-love');
        const isHope = icon.classList.contains('wireframe-hope');

        // Start state: invisible, slightly scaled down, rotated
        gsap.set(icon, { opacity: 0, scale: 0.5, rotation: isFaith ? -15 : isLove ? 10 : -10 });

        const wireTl = gsap.timeline({
          scrollTrigger: {
            trigger: section,
            start: 'top 70%',
            end: 'bottom 20%',
            scrub: 1,
          }
        });

        // Phase 1: shimmer in with scale and rotation
        wireTl.to(icon, {
          opacity: 0.85,
          scale: 1,
          rotation: 0,
          duration: 0.4,
          ease: 'power2.out',
        }, 0);

        // Phase 2: gentle floating drift through the phrase
        if (isFaith) {
          // Cross drifts upward through the text
          wireTl.to(icon, { y: -30, duration: 0.6, ease: 'sine.inOut' }, 0.2);
        } else if (isLove) {
          // Heart pulses and drifts slightly right
          wireTl.to(icon, { x: 15, y: -15, scale: 1.08, duration: 0.5, ease: 'sine.inOut' }, 0.2);
        } else if (isHope) {
          // Anchor rises upward
          wireTl.to(icon, { y: -40, duration: 0.6, ease: 'sine.inOut' }, 0.2);
        }

        // Phase 3: shimmer out as user scrolls past
        wireTl.to(icon, {
          opacity: 0,
          scale: 0.7,
          duration: 0.25,
          ease: 'power1.in',
        }, 0.75);
      });

      // Gold-glow keywords — toggle class when scrolled into view
      document.querySelectorAll('.gold-word').forEach(word => {
        const section = word.closest('.phrase-section');
        if (!section) return;
        ScrollTrigger.create({
          trigger: section,
          start: 'top 55%',
          end: 'bottom 30%',
          onEnter: () => word.classList.add('glow-active'),
          onLeave: () => word.classList.remove('glow-active'),
          onEnterBack: () => word.classList.add('glow-active'),
          onLeaveBack: () => word.classList.remove('glow-active'),
        });
      });

      // ── Hand-drawn SVG reveal (clip-path wipe left→right) ──
      document.querySelectorAll('.hand-drawn').forEach(icon => {
        const section = icon.closest('.svg-block');
        if (!section) return;
        gsap.set(icon, { opacity: 0.85, clipPath: 'inset(0 100% 0 0)' });
        const hdTl = gsap.timeline({
          scrollTrigger: {
            trigger: section,
            start: 'top 60%',
            end: 'top 10%',
            scrub: 1,
          }
        });
        hdTl.to(icon, { clipPath: 'inset(0 0% 0 0)', duration: 0.7, ease: 'power2.out' }, 0);
        hdTl.to(icon, { opacity: 0, duration: 0.2 }, 0.8);
      });

      // ── Empowered flexing SVG ──
      document.querySelectorAll('.svg-empowered').forEach(icon => {
        const section = icon.closest('.svg-block');
        if (!section) return;
        gsap.set(icon, { opacity: 0, scale: 0.5 });
        const empTl = gsap.timeline({
          scrollTrigger: {
            trigger: section,
            start: 'top 70%',
            end: 'bottom 20%',
            scrub: 1,
            onEnter: () => icon.classList.add('flexing'),
            onLeave: () => icon.classList.remove('flexing'),
            onEnterBack: () => icon.classList.add('flexing'),
            onLeaveBack: () => icon.classList.remove('flexing'),
          }
        });
        empTl.to(icon, { opacity: 0.85, scale: 1, duration: 0.4 }, 0);
        empTl.to(icon, { opacity: 0, scale: 0.7, duration: 0.25 }, 0.75);
      });

      // ── Walking figure (left→right across viewport) ──
      const walkEl = document.getElementById('walk-fixed');
      if (walkEl) {
        const walkImg = walkEl.querySelector('img');
        const v10sections = document.querySelectorAll('.phrase-section[data-verse="1:10"]');
        if (v10sections.length >= 3) {
          gsap.set(walkImg, { x: '-20vw' });
          const walkTl = gsap.timeline({
            scrollTrigger: {
              trigger: v10sections[0],
              endTrigger: v10sections[2],
              start: 'top 70%',
              end: 'top 30%',
              scrub: 1.5,
            }
          });
          walkTl.to(walkEl, { opacity: 0.8, duration: 0.1 }, 0);
          walkTl.to(walkImg, { x: '110vw', duration: 0.8, ease: 'none' }, 0);
          walkTl.to(walkEl, { opacity: 0, duration: 0.1 }, 0.9);
        }
      }

      // ── Fruit scatter (fill background, fade before next phrase) ──
      const fruitEl = document.getElementById('fruit-fixed');
      if (fruitEl) {
        const v10sections = document.querySelectorAll('.phrase-section[data-verse="1:10"]');
        if (v10sections.length >= 4) {
          const fruitTl = gsap.timeline({
            scrollTrigger: {
              trigger: v10sections[2],
              endTrigger: v10sections[3],
              start: 'top 60%',
              end: 'top 70%',
              scrub: 1,
            }
          });
          fruitTl.to(fruitEl, { opacity: 1, duration: 0.3 }, 0);
          fruitTl.to(fruitEl, { opacity: 0, duration: 0.3 }, 0.7);
        }
      }

      // ── Glory swap (bright background for blinding glory) ──
      document.querySelectorAll('.glory-swap').forEach(section => {
        ScrollTrigger.create({
          trigger: section,
          start: 'top 60%',
          end: 'bottom 30%',
          onEnter: () => section.classList.add('bright'),
          onLeave: () => section.classList.remove('bright'),
          onEnterBack: () => section.classList.add('bright'),
          onLeaveBack: () => section.classList.remove('bright'),
        });
      });

      // ── Dotted underlines (patience, endurance) ──
      document.querySelectorAll('.dotted-word').forEach(word => {
        const section = word.closest('.phrase-section');
        if (!section) return;
        ScrollTrigger.create({
          trigger: section,
          start: 'top 50%',
          end: 'bottom 30%',
          onEnter: () => word.classList.add('underline-active'),
          onLeave: () => word.classList.remove('underline-active'),
          onEnterBack: () => word.classList.add('underline-active'),
          onLeaveBack: () => word.classList.remove('underline-active'),
        });
      });

      // ── Joy emphasis (bright + larger) ──
      document.querySelectorAll('.joy-word').forEach(word => {
        const section = word.closest('.phrase-section');
        if (!section) return;
        ScrollTrigger.create({
          trigger: section,
          start: 'top 45%',
          end: 'bottom 30%',
          onEnter: () => word.classList.add('joy-active'),
          onLeave: () => word.classList.remove('joy-active'),
          onEnterBack: () => word.classList.add('joy-active'),
          onLeaveBack: () => word.classList.remove('joy-active'),
        });
      });

      // ── Kingdoms (dark castle burns red, light castle glows bright) ──
      document.querySelectorAll('.kingdoms-container').forEach(container => {
        const section = container.closest('.svg-block');
        if (!section) return;
        const dark = container.querySelector('.kingdoms-dark');
        const light = container.querySelector('.kingdoms-light');
        const kTl = gsap.timeline({
          scrollTrigger: {
            trigger: section,
            start: 'top 70%',
            end: 'bottom 20%',
            scrub: 1,
          }
        });
        // Dark castle appears with red glow
        kTl.to(dark, { opacity: 0.9, duration: 0.2 }, 0);
        // Dark castle burns (scale up + fade out = fire effect)
        kTl.to(dark, { opacity: 0, scale: 1.5, duration: 0.3, ease: 'power2.in' }, 0.3);
        // Light castle fades in bright
        kTl.to(light, { opacity: 1, scale: 1, duration: 0.4, ease: 'power2.out' }, 0.4);
        // Light castle fades out at end
        kTl.to(light, { opacity: 0, duration: 0.2 }, 0.8);
      });

      // ── Forgiveness (eraser on right rubs out mark on left) ──
      document.querySelectorAll('.forgiveness-container').forEach(container => {
        const section = container.closest('.svg-block');
        if (!section) return;
        const mark = container.querySelector('.forgiveness-mark');
        const eraser = container.querySelector('.forgiveness-eraser');
        const fTl = gsap.timeline({
          scrollTrigger: {
            trigger: section,
            start: 'top 70%',
            end: 'bottom 20%',
            scrub: 1,
          }
        });
        // Mark appears
        fTl.to(mark, { opacity: 0.85, duration: 0.2 }, 0);
        // Eraser slides in from right
        fTl.fromTo(eraser, { opacity: 0, x: 50 }, { opacity: 0.85, x: 0, duration: 0.3 }, 0.15);
        // Eraser moves left, erasing the mark
        fTl.to(eraser, { x: -80, duration: 0.3 }, 0.4);
        fTl.to(mark, { opacity: 0, clipPath: 'inset(0 0 0 100%)', duration: 0.3 }, 0.4);
        // Everything fades out
        fTl.to(eraser, { opacity: 0, duration: 0.15 }, 0.75);
      });

      // Phrase sections — scroll-scrubbed word-by-word reveal
      document.querySelectorAll('.phrase-section').forEach(section => {
        const ref = section.querySelector('.phrase-ref');
        const words = section.querySelectorAll('.word');

        // Hide elements via JS so they're visible if GSAP fails
        if (ref) gsap.set(ref, { opacity: 0, x: -20 });
        gsap.set(words, { opacity: 0 });

        const tl = gsap.timeline({
          scrollTrigger: {
            trigger: section,
            start: 'top 65%',
            end: 'top 15%',
            scrub: true,
          }
        });

        // Reference fades in first
        if (ref) {
          tl.to(ref,
            { opacity: 1, x: 0, duration: 0.3, ease: 'power2.out' }
          );
        }

        // Words reveal with stagger
        tl.to(words,
          { opacity: 1, duration: 0.1, stagger: 0.02, ease: 'power1.out' },
          ref ? '-=0.1' : '0'
        );

        // Parallax: slight upward drift
        gsap.fromTo(section.querySelector('.phrase-container'),
          { y: 40 },
          {
            y: -40,
            ease: 'none',
            scrollTrigger: {
              trigger: section,
              start: 'top bottom',
              end: 'bottom top',
              scrub: true,
            }
          }
        );
      });

      // Divider glow pulse
      document.querySelectorAll('.divider-glow').forEach(glow => {
        gsap.fromTo(glow,
          { opacity: 0, scale: 0.5 },
          {
            opacity: 0.6,
            scale: 1,
            ease: 'power2.out',
            scrollTrigger: {
              trigger: glow,
              start: 'top 80%',
              end: 'top 30%',
              scrub: true,
            }
          }
        );
      });

      // Progress bar
      ScrollTrigger.create({
        trigger: document.body,
        start: 'top top',
        end: 'bottom bottom',
        onUpdate: (self) => {
          document.getElementById('progressFill').style.width = `${self.progress * 100}%`;
        }
      });

      // Chapter dot tracking
      document.querySelectorAll('.chapter-header').forEach(header => {
        const chNum = header.id.replace('chapter-', '');
        ScrollTrigger.create({
          trigger: header,
          start: 'top center',
          end: 'bottom center',
          onEnter: () => setActiveDot(chNum),
          onEnterBack: () => setActiveDot(chNum),
        });
      });
    }

    function setActiveDot(chNum) {
      document.querySelectorAll('.chapter-dot').forEach(dot => {
        dot.classList.toggle('active', dot.dataset.chapter === String(chNum));
      });
    }

    // ────────────────────────────────────────
    // VERSION SWITCHING
    // ────────────────────────────────────────
    document.querySelectorAll('.version-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentVersion = btn.dataset.version;
        // Future: reload with different version data
        renderAll();
        window.scrollTo(0, 0);
      });
    });

    // Chapter dot click navigation
    document.querySelectorAll('.chapter-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        const target = document.getElementById(`chapter-${dot.dataset.chapter}`);
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    });

    // ────────────────────────────────────────
    // INIT
    // ────────────────────────────────────────
    renderAll();
  </script>
</body>
</html>
