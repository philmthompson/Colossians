<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="30%" stop-color="#e8b730"/>
      <stop offset="50%" stop-color="#fde68a"/>
      <stop offset="70%" stop-color="#e8b730"/>
      <stop offset="100%" stop-color="#f6d365"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Anchor — hope -->
  <g filter="url(#glow)">
    <!-- Ring at top -->
    <circle cx="100" cy="38" r="14" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
    <!-- Horizontal bar -->
    <line x1="65" y1="60" x2="135" y2="60" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Vertical shaft -->
    <line x1="100" y1="52" x2="100" y2="160" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Curved flukes -->
    <path d="M100 160 C100 160 60 155 45 125" stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M100 160 C100 160 140 155 155 125" stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Fluke tips (arrowheads) -->
    <polyline points="38,132 45,125 52,132" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="148,132 155,125 162,132" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Inner wireframe detail -->
    <circle cx="100" cy="38" r="8" stroke="url(#gold)" stroke-width="0.8" fill="none" opacity="0.4"/>
    <line x1="75" y1="60" x2="125" y2="60" stroke="url(#gold)" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>
