<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="30%" stop-color="#e8b730"/>
      <stop offset="50%" stop-color="#fde68a"/>
      <stop offset="70%" stop-color="#e8b730"/>
      <stop offset="100%" stop-color="#f6d365"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Cross — faith -->
  <g filter="url(#glow)">
    <rect x="85" y="30" width="30" height="140" rx="3" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
    <rect x="50" y="60" width="100" height="30" rx="3" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
    <!-- Inner wireframe detail lines -->
    <line x1="100" y1="30" x2="100" y2="170" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
    <line x1="50" y1="75" x2="150" y2="75" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
    <!-- Corner accents -->
    <line x1="87" y1="62" x2="92" y2="67" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
    <line x1="113" y1="62" x2="108" y2="67" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
    <line x1="87" y1="88" x2="92" y2="83" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
    <line x1="113" y1="88" x2="108" y2="83" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  </g>
</svg>
