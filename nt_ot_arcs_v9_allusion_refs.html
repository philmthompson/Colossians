  const allData=[...CITE.map(r=>({ntN:r[0],ntC:r[1],otN:r[2],otC:r[3]})),...ALLUSION.map(r=>({ntN:r[0],ntC:r[1],otN:r[2],otC:r[3]}))];
  for(const{ntN,ntC,otN,otC}of allData){
    const vis=!selectedBook||(otN===selectedBook||ntN===selectedBook);
    const ok=`${otN}:${otC}`;
    if(!drawn.has('o'+ok)){drawn.add('o'+ok);
      const cnt=OTC[ok]||0,bh=Math.sqrt(cnt)/sqrtMax*DEPTH_H,xb=pxB(otN,otC),bw=Math.max(2,VW/NB/Math.max(1,CC[otN])*0.8);
      ctx.fillStyle=`rgba(255,255,255,${vis?0.15+cnt/MAXC*0.55:0.04})`;ctx.fillRect(xb-bw/2,depthBase,bw,bh);}
    const nk=`${ntN}:${ntC}`;
    if(!drawn.has('n'+nk)){drawn.add('n'+nk);
      const cnt=NTC[nk]||0,bh=Math.sqrt(cnt)/sqrtMax*DEPTH_H,xb=pxB(ntN,ntC),bw=Math.max(2,VW/NB/Math.max(1,CC[ntN])*0.8);
      ctx.fillStyle=`rgba(255,255,255,${vis?0.15+cnt/MAXC*0.55:0.04})`;ctx.fillRect(xb-bw/2,depthBase,bw,bh);}
  }
  const marks=[1,5,20,50,MAXC];
  ctx.font='8px "Open Sans",sans-serif';ctx.fillStyle='rgba(255,255,255,0.2)';ctx.textAlign='left';
  for(const m of marks){
    const yy=depthBase+Math.sqrt(m)/sqrtMax*DEPTH_H;
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=0.4;ctx.setLineDash([2,4]);
    ctx.beginPath();ctx.moveTo(PL,yy);ctx.lineTo(W-PR,yy);ctx.stroke();ctx.setLineDash([]);
    ctx.fillText(m,PL+2,yy-1);
  }
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(PL,depthBase+DEPTH_H);ctx.lineTo(W-PR,depthBase+DEPTH_H);ctx.stroke();

  labelHits=[];ctx.font='9px "Open Sans",sans-serif';
  for(let b=1;b<=66;b++){
    const xb=pxCtr(b),lb=b<=39?OS[b]:NS[b];if(!lb)continue;
    const lv=(b-1)%LEVELS,yText=PT-(lv+1)*LSTEP-2,yTop=yText-18,yBot=yText+2;
    labelHits.push({b,x:xb,yTop,yBot});
    const isSel=(b===selectedBook);
    ctx.strokeStyle=isSel?'rgba(255,255,255,0.35)':`rgba(255,255,255,${0.05+lv*0.03})`;ctx.lineWidth=isSel?0.8:0.4;
    ctx.beginPath();ctx.moveTo(xb,PT-4);ctx.lineTo(xb,yBot);ctx.stroke();
    ctx.strokeStyle=isSel?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.12)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(xb,base);ctx.lineTo(xb,base+3);ctx.stroke();
    const col=isSel?'rgba(255,255,255,1)':(!selectedBook?(b<=39?'rgba(255,255,255,0.30)':'rgba(255,255,255,0.48)'):'rgba(255,255,255,0.22)');
    ctx.fillStyle=col;ctx.textAlign='left';
    ctx.save();ctx.translate(xb+2,yText);ctx.rotate(-Math.PI/2);
    if(isSel){const tw=ctx.measureText(lb).width;ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=0.6;ctx.beginPath();ctx.moveTo(0,2);ctx.lineTo(tw,2);ctx.stroke();}
    ctx.fillText(lb,0,0);ctx.restore();
  }
  const SL=[[1,5,'Law','rgba(255,195,0,0.62)'],[6,17,'History','rgba(0,180,80,0.55)'],[18,22,'Poetry','rgba(0,200,225,0.58)'],[23,39,'Prophets','rgba(155,90,255,0.62)'],[40,66,'New Testament','rgba(255,255,255,0.36)']];
  ctx.textAlign='center';
  for(const[s,e,lbl,col]of SL){const x1=pxCtr(s)-VW/NB/2,x2=e===66?W-PR:pxCtr(e)+VW/NB/2;ctx.fillStyle=col;ctx.font='600 10px "Open Sans",sans-serif';ctx.fillText(lbl,(x1+x2)/2,8);}
  const cnt=selectedBook?arcs.filter(arcVisible).length:arcs.length;
  const bkL=selectedBook?(ON_L[selectedBook]||NN_L[selectedBook]||''):'';
  const mL=mode==='all'?'':(mode==='cite'?' (citations)':' (allusions)');
  ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='10px "Open Sans",sans-serif';
  ctx.fillText(selectedBook?`${bkL} — ${cnt} connection${cnt!==1?'s':''}${mL}  ·  click label to clear`:`${cnt.toLocaleString()} connections${mL}  ·  click book to filter  ·  click arc to open ESV`,W-PR-4,8);
  if(hoveredArc){
    const{x1,x2,ntN,ntR,otN,otR,isCite,ntC,otC}=hoveredArc;
    ctx.textAlign='center';ctx.font='10px "Open Sans",sans-serif';ctx.fillStyle='rgba(255,255,255,0.5)';
    const lbl=isCite?`${NN_L[ntN]} ${ntR}  →  ${ON_L[otN]} ${otR}`:
      `${NN_L[ntN]} ${ntR}  ≈  ${ON_L[otN]} ${otR} (allusion)`;
    ctx.fillText(lbl,Math.min(W-PR-80,Math.max(PL+80,(x1+x2)/2)),base+DEPTH_H+DEPTH_GAP+6);
  }
}

draw();

function hitLabel(mx,my){for(const{b,x,yTop,yBot}of labelHits){if(Math.abs(mx-x)<=7&&my>=yTop&&my<=yBot+4)return b;}return null;}
function findArc(mx,my){
  const{base,VH}=lay;let best=null,bd=10;
  for(const arc of arcs){
    if(!arcVisible(arc))continue;
    const{x1,x2}=arc;if(mx<Math.min(x1,x2)-12||mx>Math.max(x1,x2)+12)continue;
    const xm=(x1+x2)/2,sp=x2-x1,h=Math.min(sp/2,VH*0.97),cp=base-2*h;
    for(let i=0;i<=32;i++){const t=i/32,bx=(1-t)*(1-t)*x1+2*(1-t)*t*xm+t*t*x2,by=(1-t)*(1-t)*base+2*(1-t)*t*cp+t*t*base;if(Math.hypot(mx-bx,my-by)<bd){bd=Math.hypot(mx-bx,my-by);best=arc;}}
  }return best;
}

cv.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(cv.width/rect.width)/dpr,my=(e.clientY-rect.top)*(cv.height/rect.height)/dpr;
  const lbk=hitLabel(mx,my),arc=lbk?null:findArc(mx,my);
  const changed=arc!==hoveredArc;hoveredArc=arc;cv.style.cursor=(lbk||arc)?'pointer':'default';
  if(changed)draw();
  if(arc){
    const{ntN,ntR,otN,otR,lxx,isCite,ntC,otC}=arc;
    const oc=OTC[`${otN}:${otC}`]||0,nc=NTC[`${ntN}:${ntC}`]||0;
    const typeLabel=isCite?'Direct citation':'Verbal allusion';
    tip.innerHTML=`<span style="color:${isCite?'#fff':'#aad0ff'};font-weight:600;font-size:12px">${NN_L[ntN]} ${ntR}</span><span style="color:#555;margin:0 5px">${isCite?'→':'≈'}</span><span style="color:#aac0d0;font-size:11px">${ON_L[otN]} ${otR}</span>${lxx?`<span style="color:#7ab;font-size:10px;margin-left:6px">LXX</span>`:''}<div style="margin-top:4px;font-size:10px;color:#666">${typeLabel} &nbsp;·&nbsp; ${NN_L[ntN]} ch.${ntC}: ${nc} ref${nc!==1?'s':''} &nbsp;·&nbsp; ${ON_L[otN]} ch.${otC}: ${oc} ref${oc!==1?'s':''}</div>${isCite?`<div style="margin-top:3px;font-size:10px;color:#555">click to open both passages in ESV.org</div>`:''}`;
    tip.style.display='block';
    const ex=e.clientX-rect.left,ey=e.clientY-rect.top;
    tip.style.left=(ex>rect.width*0.55?ex-270:ex+14)+'px';tip.style.top=Math.max(4,ey-20)+'px';
  }else tip.style.display='none';
});
cv.addEventListener('mouseleave',()=>{tip.style.display='none';if(hoveredArc){hoveredArc=null;draw();}});
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(cv.width/rect.width)/dpr,my=(e.clientY-rect.top)*(cv.height/rect.height)/dpr;
  const lbk=hitLabel(mx,my);
  if(lbk!==null){selectedBook=(selectedBook===lbk)?null:lbk;hoveredArc=null;tip.style.display='none';draw();return;}
  const arc=findArc(mx,my);
  if(!arc||!arc.isCite)return;
  window.open(esvUrl(NN_U[arc.ntN],arc.ntR),'_blank');
  window.open(esvUrl(ON_U[arc.otN],arc.otR),'_blank');
});
window.addEventListener('resize',()=>{hoveredArc=null;buildArcs();draw();});
</script>
